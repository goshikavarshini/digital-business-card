<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Digital Business Card Generator</h1>

<div class="container">

    <div class="form-section">

        <h2>Enter Your Details</h2>

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Job Title</label>
        <input type="text" id="job" placeholder="Software Developer">

        <label>Company</label>
        <input type="text" id="company" placeholder="Company Name">

        <label>Email</label>
        <input type="email" id="email">

        <label>Phone</label>
        <input type="text" id="phone">

        <label>Website</label>
        <input type="text" id="website">

    </div>

    <div class="preview-section">

        <div class="card">

            <img src="https://via.placeholder.com/120"
                 id="profileImage">

            <h2 id="cardName">Your Name</h2>

            <p id="cardJob">Job Title</p>

            <p id="cardCompany">Company Name</p>

            <p id="cardEmail">Email</p>

            <p id="cardPhone">Phone</p>

            <p id="cardWebsite">Website</p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
