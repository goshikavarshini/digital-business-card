<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Digital Business Card Generator</h1>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="form-section">

        <h2>Enter Your Details</h2>

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Job Title</label>
        <input type="text" id="job" placeholder="Software Developer">

        <label>Company</label>
        <input type="text" id="company" placeholder="Company Name">

        <label>Email</label>
        <input type="email" id="email" placeholder="abc@gmail.com">

        <label>Phone</label>
        <input type="text" id="phone" placeholder="9876543210">

        <label>Website</label>
        <input type="text" id="website" placeholder="www.website.com">

        <label>Profile Image</label>
        <input type="file" id="imageUpload" accept="image/*">

        <label>LinkedIn</label>
        <input type="text" id="linkedin" placeholder="https://linkedin.com/in/username">

        <label>GitHub</label>
        <input type="text" id="github" placeholder="https://github.com/username">

        <label>Instagram</label>
        <input type="text" id="instagram" placeholder="https://instagram.com/username">

        <label>Select Template</label>

        <select id="templateSelect">
            <option value="template1">Template 1 - Blue</option>
            <option value="template2">Template 2 - Dark</option>
            <option value="template3">Template 3 - Green</option>
        </select>

    </div>

    <!-- RIGHT SIDE -->

    <div class="preview-section">

        <div class="card template1">

            <img src="https://via.placeholder.com/120" id="profileImage">

            <h2 id="cardName">Your Name</h2>

            <p id="cardJob">Job Title</p>

            <p id="cardCompany">Company Name</p>

            <p id="cardEmail">Email</p>

            <p id="cardPhone">Phone</p>

            <p id="cardWebsite">Website</p>

            <p id="cardLinkedin">LinkedIn</p>

            <p id="cardGithub">GitHub</p>

            <p id="cardInstagram">Instagram</p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
